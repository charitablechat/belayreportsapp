    <!-- Early SW cleanup for preview/iframe environments -->
    <script>
      (function() {
        var isIframe = false;
        try { isIframe = window.self !== window.top; } catch(e) { isIframe = true; }
        var h = window.location.hostname;
        var isPreview = h.indexOf('id-preview--') !== -1 || h.indexOf('lovableproject.com') !== -1;
        if ((isPreview || isIframe) && 'serviceWorker' in navigator) {
          if (sessionStorage.getItem('sw-cleanup-done')) return;
          sessionStorage.setItem('sw-cleanup-done', '1');
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            var hadSW = regs.length > 0;
            regs.forEach(function(r) { r.unregister(); });
            if (typeof caches !== 'undefined') {
              caches.keys().then(function(keys) {
                Promise.all(keys.map(function(k) { return caches.delete(k); })).then(function() {
                  if (hadSW) window.location.reload();
                });
              });
            } else if (hadSW) {
              window.location.reload();
            }
          });
        }
      })();
    </script>
