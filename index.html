    <!-- Early SW cleanup — STRICTLY for Lovable preview/iframe contexts only.
         Production hostnames (rwreports.com, ropeworks.lovable.app) are NEVER
         touched here so the real VitePWA service worker remains active. -->
    <script>
      (function() {
        var h = window.location.hostname;
        var isPreviewHost = h.indexOf('id-preview--') !== -1 || h.indexOf('lovableproject.com') !== -1;
        var isIframe = false;
        try { isIframe = window.self !== window.top; } catch(e) { isIframe = true; }
        // Only run cleanup in preview hosts OR in iframes on preview hosts.
        // Never strip SW from production domains.
        if (!isPreviewHost && !isIframe) return;
        if (!('serviceWorker' in navigator)) return;
        if (sessionStorage.getItem('sw-cleanup-done')) return;
        sessionStorage.setItem('sw-cleanup-done', '1');
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
          if (typeof caches !== 'undefined') {
            caches.keys().then(function(keys) {
              Promise.all(keys.map(function(k) { return caches.delete(k); }));
            });
          }
        });
      })();
    </script>
