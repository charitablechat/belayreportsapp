name: CI

# Runs the same gates the maintainers ran by hand on PRs #1-#10:
#   tsc --noEmit, lint:any-budget, vitest, vite-db-version-check (via build).
# Required because previously nothing ran on PRs and the any-budget gate
# silently drifted ~46 over budget across 30+ commits.
#
# Uses bun (matches the repo's `bun.lock` and Lovable's package manager).
# `package-lock.json` is present but stale relative to package.json; bun
# is the canonical install path.

on:
  pull_request:
  push:
    branches: [main]

# Cancel previous runs on the same PR when a new commit lands (saves CI
# minutes on rapid feature-branch pushes), but NEVER cancel an in-progress
# run on `main`. If two main-push commits land back-to-back (e.g. a
# Lovable regeneration plus a maintainer hotfix) we want both runs to
# complete so the green/red signal on each commit is preserved — otherwise
# a transient breaking commit can be silently masked by the cancelled
# run's "cancelled" status, which is neither pass nor fail.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  any-budget:
    name: lint:any-budget gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint:any-budget

  test:
    name: vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx vitest run --reporter=default

  build:
    name: vite build (incl. db-version parity check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # The vite-db-version-check plugin (vite.config.ts) fails the build if
      # public/db-config.js and offline-storage.ts disagree on DB_VERSION.
      - run: bun run build

  bundle-size:
    name: bundle-size budget gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Build produces dist/assets/*.{js,css}; the budget script then
      # totals their bytes and compares to .bundle-size-budget. Mirrors
      # the lint:any-budget pattern (ratchet down on cleanup, gate up).
      - run: bun run build
      - run: bun run bundle-size:budget

  e2e-offline:
    name: playwright e2e (smoke + auth + offline-edit-reconcile)
    runs-on: ubuntu-latest
    # 12 min covers worst-case cold-cache build (~100s) + Chromium download
    # (~60s) + 3 specs (~120s with retries) with headroom.
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Playwright manages its own Chromium binary; pinned to the
      # version in package.json's @playwright/test dep.
      - run: bunx playwright install --with-deps chromium
      # Single combined run for all three e2e scopes:
      #   - tests/e2e/smoke/**         (scope A — no creds, always runs)
      #   - tests/e2e/auth/login-*     (scope B — auth-gated golden path,
      #                                 skipped at runtime when E2E_TEST_*
      #                                 are unset)
      #   - tests/e2e/auth/offline-*   (scope C — offline-edit-reconcile,
      #                                 same skip behaviour)
      # Combined keeps wall time down (one build, one preview server, one
      # Chromium install). The smoke job's `playwright.config.ts` webServer
      # block runs `bun run build && bun run preview` automatically.
      #
      # E2E_TEST_EMAIL / E2E_TEST_PASSWORD must be set as GitHub Actions
      # repo secrets for the auth-gated specs to actually run; without
      # them those specs `test.skip` at runtime (the smoke scope still
      # runs unconditionally).
      #
      # E2E_ADMIN_EMAIL / E2E_ADMIN_PASSWORD are required by the
      # `admin-pre-edit-override` spec (Tier-2 #5c). The admin user must
      # have the `admin` role assigned in `public.user_roles` (NOT
      # super_admin — super-admins are strictly read-only and don't trigger
      # the snapshot capture path). Spec test.skip's at runtime when these
      # are unset.
      - run: bunx playwright test --reporter=list
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          CI: 'true'
      # Always upload the Playwright HTML report + trace zips on failure
      # so we can diff a CI-only flake against a green local run.
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
