<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rope Works — Offline</title>
    <meta name="theme-color" content="#0b0f17" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b0f17;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      img.logo {
        width: 140px;
        height: auto;
        margin: 0 auto 24px;
        display: block;
        background: #fff;
        border-radius: 16px;
        padding: 12px;
      }
      h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
      p { font-size: 15px; line-height: 1.5; margin: 0 0 20px; color: #cbd5e1; }
      .row { display: flex; flex-direction: column; gap: 10px; }
      a.btn, button.btn {
        display: block;
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
      }
      .btn.primary { background: #1e40af; color: #fff; }
      .btn.secondary { background: transparent; color: #f8fafc; border: 1px solid #334155; }
      .hint { font-size: 12px; color: #94a3b8; margin-top: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/rope-works-logo.avif" alt="Rope Works" onerror="this.style.display='none'" />
      <h1>You're offline</h1>
      <p>You can still use Rope Works without a connection. Your work will sync automatically once you're back online.</p>
      <div class="row">
        <a class="btn primary" href="/">Open the app</a>
        <a class="btn secondary" href="/?guest=1">Continue as Guest</a>
      </div>
      <p class="hint">If this page keeps appearing, close and reopen the app.</p>
    </div>
    <script>
      // Auto-retry when the network comes back.
      window.addEventListener('online', function () {
        window.location.replace('/');
      });
    </script>
  </body>
</html>
