<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Belay Reports</title>
    <meta name="theme-color" content="#0b0f17" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b0f17;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card { max-width: 420px; width: 100%; text-align: center; }
      img.logo {
        width: 140px; height: auto; margin: 0 auto 24px; display: block;
        background: #fff; border-radius: 16px; padding: 12px;
      }
      h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
      p { font-size: 15px; line-height: 1.5; margin: 0 0 20px; color: #cbd5e1; }
      .row { display: flex; flex-direction: column; gap: 10px; }
      a.btn, button.btn {
        display: block; width: 100%; padding: 14px 16px; font-size: 16px;
        font-weight: 600; border-radius: 10px; border: 0; cursor: pointer;
        text-decoration: none; text-align: center;
      }
      .btn.primary { background: #1e40af; color: #fff; }
      .btn.secondary { background: transparent; color: #f8fafc; border: 1px solid #334155; }
      .hint { font-size: 12px; color: #94a3b8; margin-top: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/__l5e/assets-v1/8c7f8dfa-a725-400e-8f7e-c806cf7d7039/belay-reports-wide.gif" alt="Belay Reports" onerror="this.style.display='none'" />
      <h1>Opening Belay Reports…</h1>
      <p>If this screen stays for more than a moment, tap below to continue.</p>
      <div class="row">
        <a class="btn primary" id="open-app" href="/?shell=1">Open the app</a>
        <a class="btn secondary" href="/?guest=1">Continue as Guest</a>
      </div>
      <p class="hint">Your saved work stays on this device until you reconnect.</p>
    </div>
    <script>
      // Self-heal: this page should never be a permanent destination.
      // 1. If the app shell is reachable in any Cache Storage entry, redirect
      //    into it immediately so React mounts and the user sees the real app.
      // 2. Otherwise, retry navigating to "/" after a short delay — the
      //    service worker's network-first navigation handler will serve the
      //    cached shell on the next attempt.
      // 3. If we come back online at any point, jump straight back to "/".
      (function () {
        var REDIRECTED_FLAG = 'rw-offline-self-heal';

        function goToShell() {
          try { sessionStorage.setItem(REDIRECTED_FLAG, String(Date.now())); } catch (e) {}
          window.location.replace('/?shell=1');
        }

        async function tryShellRedirect() {
          if (!('caches' in self)) return false;
          try {
            var keys = await caches.keys();
            for (var i = 0; i < keys.length; i += 1) {
              var cache = await caches.open(keys[i]);
              var hit = await cache.match('/index.html', { ignoreSearch: true })
                || await cache.match('/', { ignoreSearch: true });
              if (hit) { goToShell(); return true; }
            }
          } catch (e) { /* ignore */ }
          return false;
        }

        // Attempt immediately, then once more after the SW has had a chance
        // to install / claim clients on a very fresh PWA install.
        tryShellRedirect().then(function (ok) {
          if (ok) return;
          setTimeout(function () { tryShellRedirect(); }, 1500);
        });

        window.addEventListener('online', function () {
          window.location.replace('/');
        });
      })();
    </script>
  </body>
</html>
